<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>

  <section class="intro">
    <h1>Every idea begins as a single image</h1>
  </section>
  <section class="sticky">
    <div class="sticky-header">
      <h1>Three pillars with one purpose</h1>
    </div>

    <div class="card-container">
      <div class="card" id="card-1">
        <div class="card-front">
          <img src="./image.png" alt="">
        </div>
        <div class="card-back">
          <span>( 01 )</span>
          <p>Interactive web experiences</p>
        </div>
      </div>

      <div class="card" id="card-2">
        <div class="card-front">
          <img src="./image2.png" alt="">
        </div>
        <div class="card-back">
          <span>( 02 )</span>
          <p>Thoughtful Design language</p>
        </div>
      </div>

      <div class="card" id="card-3">
        <div class="card-front">
          <img src="./image3.png" alt="">
        </div>
        <div class="card-back">
          <span>( 03 )</span>
          <p>Visual design systems</p>
        </div>
      </div>

    </div>
  </section>
  <section class="outro">
    <h1>Every transition leaves a trace</h1>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
    integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"
    integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="script.js"></script>
</body>

</html>
